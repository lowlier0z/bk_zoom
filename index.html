<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>detail</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/openseadragon.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: white;
      overflow: hidden;
      font-family: sans-serif;
    }

    #viewer {
      width: 100%;
      height: 100%;
    }

    /* Back button */
    #backBtn {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 9999;
      color: white;
      font-size: 14px;
      padding: 8px 10px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.25);
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    #backBtn:hover {
      background: rgba(255,255,255,0.1);
    }

    /* Zoom controls */
    #controls {
      position: absolute;
      bottom: 12px;
      right: 12px;
      z-index: 9999;
      display: flex;
      gap: 6px;
    }

    #controls button {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.4);
      color: white;
      font-size: 18px;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    #controls button:hover {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<div id="viewer"></div>

<div id="backBtn">← Back</div>

<div id="controls">
  <button id="zoomIn">+</button>
  <button id="zoomOut">−</button>
</div>

<script>
  // Read image from URL
  const params = new URLSearchParams(window.location.search);
  const img = params.get("img");

  if (!img) {
    document.body.innerHTML = "<div style='color:white;padding:20px;'>No image specified</div>";
  }

  // Create viewer
  const viewer = OpenSeadragon({
    id: "viewer",
    prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/images/",
    tileSources: img,

    showNavigationControl: false,
    showZoomControl: false,
    showHomeControl: false,
    showFullPageControl: false
  });

  // Back button
  document.getElementById("backBtn").onclick = () => {
    if (document.referrer) {
      window.history.back();
    } else {
      window.location.href = "http://cargo.site";
    }
  };

  // Zoom controls
  document.getElementById("zoomIn").onclick = () => {
    viewer.viewport.zoomBy(1.2);
    viewer.viewport.applyConstraints();
  };

  document.getElementById("zoomOut").onclick = () => {
    viewer.viewport.zoomBy(0.8);
    viewer.viewport.applyConstraints();
  };
</script>

</body>
</html>
