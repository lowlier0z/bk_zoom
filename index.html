<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zoom</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/openseadragon.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: white;
      overflow: hidden;
    }

    #viewer {
      width: 100%;
      height: 100%;
    }

    /* ULTRA MINIMAL GLASS UI */
    .ui {
      position: absolute;
      z-index: 9999;
      display: flex;
      gap: 10px;

      background: rgba(20,20,20,0.25);
      backdrop-filter: blur(14px);

      padding: 10px;
      border-radius: 14px;
    }

    /* Top-left back */
    #back {
      bottom: 16px;
      left: 16px;
      z-index: 9999;
    }

    /* Bottom-right zoom */
    #zoom {
      bottom: 16px;
      right: 16px;
      flex-direction: column;
    }

    button {
      all: unset;
      cursor: pointer;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;

      color: rgba(255,255,255,0.85);
      font-size: 18px;

      transition: 0.15s;
    }

    button:hover {
      color: white;
      transform: scale(1.05);
    }

    /* SF Symbol fallback style */
    .sf {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Icons", system-ui, sans-serif;
      font-weight: 200;
    }
  </style>
</head>

<body>

<div id="viewer"></div>

<!-- Back -->
<div id="back" class="ui">
  <button id="backBtn" class="sf">←</button>
</div>

<!-- Zoom -->
<div id="zoom" class="ui">
  <button id="zoomIn" class="sf">+</button>
  <button id="zoomOut" class="sf">−</button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const img = params.get("img");

  const viewer = OpenSeadragon({
    id: "viewer",
    tileSources: img,
    prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/images/",

    showNavigationControl: false,
    showZoomControl: false,
    showHomeControl: false,
    showFullPageControl: false
  });

  // back
  document.getElementById("backBtn").onclick = () => {
    if (document.referrer) {
      history.back();
    } else {
      window.location.href = "https://cargo.site";
    }
  };

  // zoom
  document.getElementById("zoomIn").onclick = () => {
    viewer.viewport.zoomBy(1.3);
    viewer.viewport.applyConstraints();
  };

  document.getElementById("zoomOut").onclick = () => {
    viewer.viewport.zoomBy(0.75);
    viewer.viewport.applyConstraints();
  };
</script>

</body>
</html>
