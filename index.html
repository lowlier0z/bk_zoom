<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BK Zoom</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/openseadragon.min.js"></script>

  <style>
    #backBtn {
  position: absolute;
  top: 15px;
  left: 15px;
  z-index: 9999;
  color: white;
  font-family: sans-serif;
  font-size: 14px;
  padding: 8px 12px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
  user-select: none;
  backdrop-filter: blur(6px);
}

#backBtn:hover {
  background: rgba(255,255,255,0.1);
}
    html, body, #viewer {
      margin: 0;
      width: 100%;
      height: 100%;
      background: white;
    }
  </style>
</head>

<body>
<div id="backBtn">← Back</div>
<div id="viewer"></div>

<script>
  document.getElementById("backBtn").onclick = () => {
  if (document.referrer) {
    window.history.back();
  } else {
    window.location.href = "https://YOUR-CARGO-SITE.com";
  }
};
  const params = new URLSearchParams(window.location.search);

  // CHANGE ONLY THIS: it reads whatever you pass in the URL
  const img = params.get("img");

  if (!img) {
    document.body.innerHTML = "<p style='color:white; padding:20px;'>No image specified</p>";
  } else {
    OpenSeadragon({
      id: "viewer",
      prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/images/",
      tileSources: img
    });
  }
</script>

</body>
</html>
