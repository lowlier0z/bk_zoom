<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>detail</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/openseadragon.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: white; /* NEW: white museum background */
      overflow: hidden;
    }

    /* Fade-in wrapper */
    #viewer {
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s ease; /* smooth fade */
    }

    /* Bottom-left back button */
    #back {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 9999;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 10px 12px;
      border-radius: 12px;

      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);

      color: rgba(0,0,0,0.75);
      font-size: 18px;

      cursor: pointer;
      user-select: none;

      transition: all 0.2s ease;
    }

    #back:hover {
      background: rgba(255,255,255,0.9);
      color: black;
    }
  </style>
</head>

<body>

<div id="viewer"></div>

<div id="back">←</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const img = params.get("img");

  const viewer = OpenSeadragon({
    id: "viewer",
    tileSources: img,
    prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/images/",

    showNavigationControl: false,
    showZoomControl: false,
    showHomeControl: false,
    showFullPageControl: false
  });

  // Fade in once image is ready
  viewer.addHandler("open", () => {
    document.getElementById("viewer").style.opacity = 1;
  });

  // Back button behavior
  document.getElementById("back").onclick = () => {
    if (document.referrer) {
      history.back();
    } else {
      window.location.href = "https://YOUR-CARGO-SITE.com";
    }
  };
</script>

</body>
</html>
