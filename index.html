<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BK Zoom</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/openseadragon.min.js"></script>

  <style>
    html, body, #viewer {
      margin: 0;
      width: 100%;
      height: 100%;
      background: white;
    }
  </style>
</head>

<body>
<div id="viewer"></div>

<script>
  const params = new URLSearchParams(window.location.search);

  // CHANGE ONLY THIS: it reads whatever you pass in the URL
  const img = params.get("img");

  if (!img) {
    document.body.innerHTML = "<p style='color:white; padding:20px;'>No image specified</p>";
  } else {
    OpenSeadragon({
      id: "viewer",
      prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/images/",
      tileSources: img
    });
  }
</script>

</body>
</html>
