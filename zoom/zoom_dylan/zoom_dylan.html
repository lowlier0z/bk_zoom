<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Deep Zoom</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/openseadragon.min.js"></script>
  <style>
    html, body, #viewer {
      width: 100%;
      height: 100%;
      margin: 0;
      background: white;
    }
  </style>
</head>
<body>
<div id="viewer"></div>

<script>
  OpenSeadragon({
    id: "viewer",
    prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/images/",
    tileSources: "zoom_dylan.dzi"
  });
</script>
</body>
</html>
